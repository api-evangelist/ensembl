apis:
  - aid: ensembl:rest-api
    name: Ensembl REST API
    description: >-
      The Ensembl REST API (v15.12) provides language-agnostic HTTP access to
      genome annotation data across hundreds of vertebrate and eukaryotic species.
      It exposes 19 endpoint categories covering genome sequences, gene and
      transcript lookups, variant effect prediction (VEP), comparative genomics
      (gene trees, homology, alignments), coordinate mapping between assemblies,
      regulatory features, linkage disequilibrium, ontology and taxonomy queries,
      phenotype annotations, and GA4GH-compliant genomic data access. Both GET
      and POST methods are available; POST endpoints support batch operations
      for multiple identifiers. No authentication is required for public use.
    humanURL: https://rest.ensembl.org
    baseURL: https://rest.ensembl.org
    tags:
