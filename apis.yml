aid: ensembl
name: Ensembl
description: >-
  Ensembl is a genome annotation database and browser maintained by the European
  Bioinformatics Institute (EMBL-EBI) and the Wellcome Sanger Institute. It
  provides comprehensive genome data for vertebrates and other eukaryotic organisms,
  covering gene annotation, variant data, regulatory features, comparative genomics,
  and evolutionary analysis across hundreds of species. The Ensembl REST API offers
  language-agnostic HTTP access to this genome data without requiring local database
  installations or Perl API dependencies.
