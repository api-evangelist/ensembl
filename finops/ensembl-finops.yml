provider: Ensembl
providerId: ensembl
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - Genomics
  - Bioinformatics
  - Genome Annotation
  - Life Sciences
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps for Ensembl. The Ensembl REST API carries zero direct
  monetary cost — it is a free public scientific resource operated by
  EMBL-EBI and Wellcome Sanger Institute. FinOps considerations therefore
  focus on the indirect cost of compute consumed while calling the API
  (cloud egress, worker time, retry overhead) and on choosing the correct
  data access method (REST API vs. FTP bulk download vs. local database
  mirror) to minimise wasted spend in downstream pipelines. Pipelines that
  exceed the 55,000 req/hr rate limit incur opportunity cost from retries
  and pipeline delays rather than direct API charges.
sources:
  - https://rest.ensembl.org
  - https://github.com/Ensembl/ensembl-rest/wiki/Rate-Limits
  - https://www.ensembl.org/info/docs/api/index.html
