meters:
  - name: api_requests
    description: >-
      Count of HTTP requests made to rest.ensembl.org. No direct charge, but
      each request counts against the 55,000 req/hr quota and consumes
      downstream compute time (worker CPU, network egress).
    unit: request
    aggregation: sum
    dimensions:
      - endpoint_category
      - method
      - species
  - name: retry_requests
    description: >-
      Count of retry requests triggered by 429 rate limit responses. Each
      retry represents wasted pipeline time and indirect compute cost.
    unit: request
    aggregation: sum
    dimensions:
      - endpoint_category
      - pipeline_name
  - name: bulk_download_bytes
    description: >-
      Volume of data retrieved via Ensembl FTP bulk download as an alternative
      to repeated REST calls. Relevant for cloud egress cost attribution.
    unit: byte
    aggregation: sum
    dimensions:
      - dataset
      - species
      - release_version
principles:
  - name: Visibility
    description: >-
      Instrument pipeline code to count REST API calls per endpoint category
      and species. Track X-RateLimit-Remaining in logs to detect when
      pipelines are approaching quota exhaustion before 429s appear.
  - name: Allocation
    description: >-
      Tag API calls with a pipeline_name or team label in application logs so
      that indirect compute cost (worker time, egress) can be attributed to
      the correct cost centre. Separate test and production pipeline traffic
      by IP or via local mirrors to prevent development runs from consuming
      the shared production quota.
  - name: Optimization
    description: >-
      Use batch POST endpoints for multi-identifier lookups to reduce per-call
      overhead. For full-genome or species-wide datasets, prefer the Ensembl
      FTP service over repeated REST calls to avoid rate limit delays. Stand
      up a local Ensembl database mirror for high-throughput institutional
      pipelines that regularly exceed 55,000 req/hr. Cache stable reference
      data (gene annotations, assembly metadata) locally to eliminate
      redundant API calls.
  - name: Accountability
    description: >-
      Assign a bioinformatics lead as the responsible owner for API usage
      budgets within shared compute environments. Review pipeline retry rates
      monthly; a rising retry rate signals that the pipeline needs batching
      optimisation or a local mirror before cloud egress costs escalate.
